<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="수량 관리">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/667eea/FFFFFF?text=📦">
    <title>수량 관리</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            transform: scale(0.9);
            transform-origin: top center;
        }

        /* 탭 */
        .tab-container {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            background: #f0f0f0;
            padding: 6px;
            border-radius: 14px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            text-align: center;
            margin-bottom: 12px;
        }

        .target-section {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f4ff;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 12px;
        }

        .target-label {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
        }

        .target-input {
            flex: 1;
            border: none;
            background: white;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            color: #333;
            outline: none;
        }

        .btn-container {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-reset {
            background: #e0e0e0;
            color: #666;
        }

        .btn-copy {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-share {
            background: linear-gradient(135deg, #fee140, #fa709a);
            color: white;
        }

        .btn-add {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            width: auto;
            padding: 12px 20px;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-name {
            flex: 1;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 15px;
            font-weight: 600;
            color: #555;
        }

        .item-name-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            color: #555;
            outline: none;
        }

        .item-control {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .qty-btn {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            user-select: none;
        }

        .qty-btn.minus {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }

        .qty-btn.plus {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }

        .qty-btn:active {
            transform: scale(0.92);
            opacity: 0.8;
        }

        .qty-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .qty-value {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            min-width: 40px;
            text-align: center;
        }

        .delete-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: #ff6b6b;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            user-select: none;
        }

        .delete-btn:active {
            transform: scale(0.92);
        }

        .region-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .region-item {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border-radius: 16px;
            padding: 6px;
        }

        .region-name {
            width: 90px;
            font-size: 18px;
            font-weight: 700;
            color: #555;
            text-align: center;
        }

        .qty-control {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border-radius: 12px;
            padding: 4px;
        }

        .total-section {
            margin-top: 16px;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            color: white;
        }

        .total-label {
            font-size: 12px;
            opacity: 0.9;
            text-align: center;
        }

        .total-value {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-top: 2px;
        }

        /* 토스트 메시지 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tab-container">
            <button class="tab active" data-tab="pallet">📦 파렛트 출고</button>
            <button class="tab" data-tab="box">📦 박스 발주</button>
        </div>

        <!-- 파렛트 출고 탭 -->
        <div class="tab-content active" id="pallet-tab">
            <div class="btn-container">
                <button class="btn btn-reset" id="palletResetBtn">초기화</button>
                <button class="btn btn-copy" id="palletCopyBtn">복사</button>
                <button class="btn btn-share" id="palletShareBtn">공유</button>
            </div>

            <div class="target-section">
                <span class="target-label">👤 대상자:</span>
                <input type="text" class="target-input" id="palletTarget" placeholder="이름 입력">
            </div>

            <h1>파렛트 수량 관리</h1>

            <div class="region-list" id="regionList">
                <!-- 자동 생성 -->
            </div>

            <div class="total-section">
                <div class="total-label">합 계</div>
                <div class="total-value" id="palletTotal">0</div>
            </div>
        </div>

        <!-- 박스 발주 탭 -->
        <div class="tab-content" id="box-tab">
            <div class="btn-container">
                <button class="btn btn-reset" id="boxResetBtn">초기화</button>
                <button class="btn btn-copy" id="boxCopyBtn">복사</button>
                <button class="btn btn-share" id="boxShareBtn">공유</button>
            </div>

            <div class="target-section">
                <span class="target-label">👤 대상자:</span>
                <input type="text" class="target-input" id="boxTarget" placeholder="이름 입력">
            </div>

            <h1>박스 발주 수량</h1>

            <div class="item-list" id="boxList">
                <!-- 자동 생성 -->
            </div>

            <div style="text-align: center; margin-top: 8px;">
                <button class="btn btn-add" id="addBoxBtn">+ 항목 추가</button>
            </div>

            <div class="total-section">
                <div class="total-label">합 계</div>
                <div class="total-value" id="boxTotal">0</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ==================== 공통 ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ==================== 탭 ====================
        const tabs = document.querySelectorAll('.tab');
        const tabContents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
            });
        });

        // ==================== 파렛트 출고 ====================
        const regions = ['EAST', 'WEST', 'MIDDLE', 'GMH', 'DGU', 'GWJ', 'YATATO'];
        const palletQuantities = {};

        regions.forEach(r => palletQuantities[r] = 0);

        // 대상자 로드
        const savedPalletTarget = localStorage.getItem('palletTarget');
        if (savedPalletTarget) {
            document.getElementById('palletTarget').value = savedPalletTarget;
        }

        document.getElementById('palletTarget').addEventListener('change', (e) => {
            localStorage.setItem('palletTarget', e.target.value);
        });

        function renderRegions() {
            const container = document.getElementById('regionList');
            container.innerHTML = '';

            regions.forEach(region => {
                const item = document.createElement('div');
                item.className = 'region-item';
                item.innerHTML = `
                    <div class="region-name">${region}</div>
                    <div class="qty-control">
                        <button class="qty-btn minus" data-region="${region}" data-type="pallet">−</button>
                        <div class="qty-value" id="pallet-qty-${region}">${palletQuantities[region]}</div>
                        <button class="qty-btn plus" data-region="${region}" data-type="pallet">+</button>
                    </div>
                `;
                container.appendChild(item);
            });

            document.querySelectorAll('.qty-btn[data-type="pallet"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const region = btn.dataset.region;
                    const isPlus = btn.classList.contains('plus');
                    updatePalletQuantity(region, isPlus ? 1 : -1);
                });
            });
        }

        function updatePalletQuantity(region, delta) {
            const newValue = palletQuantities[region] + delta;
            if (newValue < 0) return;
            palletQuantities[region] = newValue;
            document.getElementById(`pallet-qty-${region}`).textContent = newValue;
            calculatePalletTotal();
        }

        function calculatePalletTotal() {
            const sum = Object.values(palletQuantities).reduce((a, b) => a + b, 0);
            document.getElementById('palletTotal').textContent = sum;
        }

        function getPalletCopyText() {
            let copyText = '[파렛트 수량 현황]\n';
            regions.forEach(r => {
                let dots = '·'.repeat(Math.max(0, 7 - r.length));
                if (r === 'EAST') dots += '···';
                if (r === 'DGU') dots += '···';
                if (r === 'GWJ') dots += '···';
                if (r === 'WEST' || r === 'GMH') dots += '··';
                copyText += `${r}${dots} : ${palletQuantities[r]}\n`;
            });
            copyText += `----------------\n합 계    : ${document.getElementById('palletTotal').textContent}`;
            return copyText;
        }

        document.getElementById('palletResetBtn').addEventListener('click', () => {
            regions.forEach(r => {
                palletQuantities[r] = 0;
                document.getElementById(`pallet-qty-${r}`).textContent = 0;
            });
            calculatePalletTotal();
            showToast('초기화되었습니다');
        });

        document.getElementById('palletCopyBtn').addEventListener('click', async () => {
            const copyText = getPalletCopyText();
            const targetName = document.getElementById('palletTarget').value;
            try {
                await navigator.clipboard.writeText(copyText);
                showToast(targetName ? `${targetName}에게 복사되었습니다!` : '복사되었습니다!');
            } catch (err) {
                const temp = document.createElement('textarea');
                temp.value = copyText;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                showToast('복사되었습니다!');
            }
        });

        document.getElementById('palletShareBtn').addEventListener('click', async () => {
            const copyText = getPalletCopyText();
            if (navigator.share) {
                try {
                    await navigator.share({ title: '파렛트 수량 현황', text: copyText });
                } catch (err) {}
            } else {
                showToast('이 브라우저는 공유를 지원하지 않습니다');
            }
        });

        // ==================== 박스 발주 ====================
        let boxItems = [
            { id: 1, name: '모던 플러스 5단', quantity: 0 },
            { id: 2, name: '모던 플러스 4단', quantity: 0 },
            { id: 3, name: '모던 플러스 3단', quantity: 0 },
            { id: 4, name: '와이드 4단', quantity: 0 },
            { id: 5, name: '슬림서랍장 8단', quantity: 0 },
            { id: 6, name: '슬림서랍장 6단', quantity: 0 },
            { id: 7, name: '슬립서랍장 4단', quantity: 0 },
            { id: 8, name: '슬림서람장 3단', quantity: 0 },
            { id: 9, name: '슬림서람장 2단', quantity: 0 },
            { id: 10, name: '맥스 서랍장 6단', quantity: 0 },
            { id: 11, name: '맥스 서랍장 4단', quantity: 0 },
            { id: 12, name: '맥스 서랍장 3단', quantity: 0 },
            { id: 13, name: '맥스 서랍장 2단', quantity: 0 },
            { id: 14, name: '무지캡 특대', quantity: 0 },
            { id: 15, name: '무지캡 대', quantity: 0 },
            { id: 16, name: '무지캡 중', quantity: 0 },
            { id: 17, name: '무지캡 소', quantity: 0 },
            { id: 18, name: '데크타일', quantity: 0 },
            { id: 19, name: '다이소 상판형', quantity: 0 },
            { id: 20, name: '다이소 하판형', quantity: 0 }
        ];
        let nextBoxId = 4;

        // 박스 항목 로드
        const savedBoxItems = localStorage.getItem('boxItems');
        if (savedBoxItems) {
            boxItems = JSON.parse(savedBoxItems);
            nextBoxId = Math.max(...boxItems.map(i => i.id)) + 1;
        }

        // 박스 대상자 로드
        const savedBoxTarget = localStorage.getItem('boxTarget');
        if (savedBoxTarget) {
            document.getElementById('boxTarget').value = savedBoxTarget;
        }

        document.getElementById('boxTarget').addEventListener('change', (e) => {
            localStorage.setItem('boxTarget', e.target.value);
        });

        function renderBoxList() {
            const container = document.getElementById('boxList');
            container.innerHTML = '';

            boxItems.forEach(item => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div class="item-name">
                        <input type="text" class="item-name-input" data-id="${item.id}" value="${item.name}">
                    </div>
                    <div class="item-control">
                        <button class="qty-btn minus" data-id="${item.id}" data-type="box">−</button>
                        <div class="qty-value" id="box-qty-${item.id}">${item.quantity}</div>
                        <button class="qty-btn plus" data-id="${item.id}" data-type="box">+</button>
                    </div>
                    <button class="delete-btn" data-id="${item.id}">×</button>
                `;
                container.appendChild(row);
            });

            // 이름 변경 이벤트
            document.querySelectorAll('.item-name-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const id = parseInt(e.target.dataset.id);
                    const item = boxItems.find(i => i.id === id);
                    if (item) {
                        item.name = e.target.value;
                        saveBoxItems();
                    }
                });
            });

            // 수량 버튼 이벤트
            document.querySelectorAll('.qty-btn[data-type="box"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const id = parseInt(btn.dataset.id);
                    const isPlus = btn.classList.contains('plus');
                    updateBoxQuantity(id, isPlus ? 1 : -1);
                });
            });

            // 삭제 버튼 이벤트
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.dataset.id);
                    deleteBoxItem(id);
                });
            });
        }

        function updateBoxQuantity(id, delta) {
            const item = boxItems.find(i => i.id === id);
            if (!item) return;
            const newValue = item.quantity + delta;
            if (newValue < 0) return;
            item.quantity = newValue;
            document.getElementById(`box-qty-${id}`).textContent = newValue;
            calculateBoxTotal();
            saveBoxItems();
        }

        function deleteBoxItem(id) {
            boxItems = boxItems.filter(i => i.id !== id);
            renderBoxList();
            calculateBoxTotal();
            saveBoxItems();
        }

        function addBoxItem() {
            boxItems.push({ id: nextBoxId++, name: '새 항목', quantity: 0 });
            renderBoxList();
            calculateBoxTotal();
            saveBoxItems();
        }

        function calculateBoxTotal() {
            const sum = boxItems.reduce((a, b) => a + b.quantity, 0);
            document.getElementById('boxTotal').textContent = sum;
        }

        function saveBoxItems() {
            localStorage.setItem('boxItems', JSON.stringify(boxItems));
        }

        function getBoxCopyText() {
            let copyText = '[박스 발주 수량]\n';
            boxItems.forEach(item => {
                if (item.quantity > 0) {
                    const paddedName = item.name.padEnd(15, ' ');
                    copyText += `${paddedName}: ${item.quantity}\n`;
                }
            });
            copyText += `----------------\n합 계 : ${document.getElementById('boxTotal').textContent}`;
            return copyText;
        }

        document.getElementById('addBoxBtn').addEventListener('click', addBoxItem);

        document.getElementById('boxResetBtn').addEventListener('click', () => {
            boxItems.forEach(item => {
                item.quantity = 0;
            });
            renderBoxList();
            calculateBoxTotal();
            saveBoxItems();
            showToast('초기화되었습니다');
        });

        document.getElementById('boxCopyBtn').addEventListener('click', async () => {
            const copyText = getBoxCopyText();
            const targetName = document.getElementById('boxTarget').value;
            try {
                await navigator.clipboard.writeText(copyText);
                showToast(targetName ? `${targetName}에게 복사되었습니다!` : '복사되었습니다!');
            } catch (err) {
                const temp = document.createElement('textarea');
                temp.value = copyText;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                showToast('복사되었습니다!');
            }
        });

        document.getElementById('boxShareBtn').addEventListener('click', async () => {
            const copyText = getBoxCopyText();
            if (navigator.share) {
                try {
                    await navigator.share({ title: '박스 발주 수량', text: copyText });
                } catch (err) {}
            } else {
                showToast('이 브라우저는 공유를 지원하지 않습니다');
            }
        });

        // ==================== 초기화 ====================
        renderRegions();
        renderBoxList();

        // ==================== Service Worker 등록 ====================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(reg => console.log('Service Worker 등록됨'))
                .catch(err => console.log('Service Worker 등록 실패:', err));
        }
    </script>

</body>
</html>
